# pytest configuration for traffic engine test suite

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*

# Test output configuration
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --disable-warnings
    -ra

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests across components  
    api: API endpoint and HTTP interface tests
    domain: Domain model and business logic tests
    providers: External provider and adapter tests
    simulation: NaSch simulation and rules tests
    slow: Tests that take longer to execute
    
# Minimum Python version
minversion = 3.8

# Coverage reporting (when pytest-cov is installed)
# Run with: pytest --cov=src/traffic_engine --cov-report=html